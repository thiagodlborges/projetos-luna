<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luna Gelato & Caffè — Gestão de Projetos</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,900;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      --bordo:#6B1A2A;--bordo-dark:#4A0F1C;--bordo-light:#8B2A3E;
      --marrom:#5C3A1E;--marrom-light:#7A5234;--marrom-pale:#C4A882;
      --cream:#F5EFE6;--cream-dark:#EDE0CE;
      --gold:#C9A84C;--gold-light:#E8C97A;
      --white:#FDFAF6;--text-dark:#2C1A0E;--text-mid:#5C3A1E;--text-light:#9A7B5A;
      --danger:#C0392B;--success:#2E7D4F;--warning:#C67C1A;--info:#2563EB;
      --shadow:0 4px 24px rgba(107,26,42,.12);--shadow-lg:0 8px 48px rgba(107,26,42,.18);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;overflow-x:hidden}

    /* SIDEBAR */
    .sidebar{position:fixed;left:0;top:0;bottom:0;width:264px;background:var(--bordo-dark);display:flex;flex-direction:column;z-index:100;box-shadow:var(--shadow-lg)}
    .sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;gap:6px}
    .sidebar-logo img{width:148px;height:auto;mix-blend-mode:screen;}
    .sidebar-logo-fallback{font-family:'Playfair Display',serif;font-size:19px;font-weight:900;color:var(--gold-light);text-align:center;line-height:1.3;display:none}
    .sidebar-logo-sub{font-size:9.5px;color:rgba(255,255,255,.3);letter-spacing:1.8px;text-transform:uppercase;text-align:center}
    .sidebar-section{padding:16px 16px 5px;font-size:9.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.28)}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 17px;margin:1px 10px;border-radius:10px;cursor:pointer;transition:all .2s;color:rgba(255,255,255,.6);font-size:13px;font-weight:500;text-decoration:none}
    .sidebar-item:hover{background:rgba(255,255,255,.1);color:#fff}
    .sidebar-item.active{background:var(--bordo-light);color:#fff}
    .sidebar-item .icon{width:29px;height:29px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;background:rgba(255,255,255,.08);flex-shrink:0}
    .sidebar-item.active .icon{background:rgba(255,255,255,.18)}
    .sidebar-bottom{margin-top:auto;padding:14px 16px;border-top:1px solid rgba(255,255,255,.08)}
    .year-label{font-size:9.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:8px}
    .year-selector{display:flex;gap:6px;flex-wrap:wrap}
    .year-btn{padding:5px 13px;border-radius:20px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.12);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
    .year-btn:hover,.year-btn.active{background:var(--gold);color:var(--bordo-dark);border-color:var(--gold)}

    /* MAIN */
    .main{margin-left:264px;min-height:100vh}
    .topbar{background:var(--white);padding:14px 32px;border-bottom:1px solid var(--cream-dark);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(107,26,42,.06);gap:14px}
    .topbar-title h2{font-family:'Playfair Display',serif;font-size:19px;color:var(--bordo-dark)}
    .topbar-title p{font-size:11.5px;color:var(--text-light);margin-top:2px}

    /* SEARCH */
    .search-bar{flex:1;max-width:420px;position:relative}
    .search-bar input{width:100%;padding:9px 15px 9px 38px;border-radius:24px;border:1.5px solid var(--cream-dark);background:var(--cream);color:var(--text-dark);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:all .2s}
    .search-bar input:focus{border-color:var(--bordo);background:#fff;box-shadow:0 0 0 3px rgba(107,26,42,.08)}
    .search-bar input::placeholder{color:var(--text-light)}
    .search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text-light);pointer-events:none}
    .search-clear{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-light);display:none;padding:2px 4px;border-radius:50%;transition:all .15s}
    .search-clear:hover{color:var(--bordo)}
    .search-bar input:not(:placeholder-shown)~.search-clear{display:block}
    .search-results{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--white);border-radius:14px;box-shadow:var(--shadow-lg);border:1px solid var(--cream-dark);max-height:360px;overflow-y:auto;z-index:200;display:none}
    .search-results.show{display:block}
    .search-result-item{padding:11px 15px;cursor:pointer;border-bottom:1px solid var(--cream-dark);transition:background .15s;display:flex;gap:10px;align-items:flex-start}
    .search-result-item:last-child{border-bottom:none}
    .search-result-item:hover{background:var(--cream)}
    .res-icon{font-size:17px;flex-shrink:0;margin-top:1px}
    .res-info{flex:1;min-width:0}
    .res-name{font-size:13px;font-weight:600;color:var(--text-dark)}
    .res-meta{font-size:10.5px;color:var(--text-light);margin-top:2px}
    .search-empty{padding:20px;text-align:center;color:var(--text-light);font-size:13px}
    .search-section-label{padding:7px 15px 3px;font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-light);background:var(--cream)}

    .topbar-actions{display:flex;gap:10px;align-items:center;flex-shrink:0}
    .btn-add{display:flex;align-items:center;gap:7px;background:var(--bordo);color:#fff;padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;font-family:'DM Sans',sans-serif;white-space:nowrap}
    .btn-add:hover{background:var(--bordo-light);transform:translateY(-1px)}

    .content{padding:26px 32px}

    /* STATS */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
    .stat-card{background:var(--white);border-radius:15px;padding:18px 20px;box-shadow:var(--shadow);border-left:4px solid var(--bordo)}
    .stat-card.warn{border-left-color:var(--warning)}.stat-card.success{border-left-color:var(--success)}.stat-card.info{border-left-color:var(--gold)}.stat-card.danger{border-left-color:var(--danger)}
    .stat-label{font-size:10.5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-light)}
    .stat-value{font-size:34px;font-weight:700;margin-top:4px;color:var(--bordo-dark);line-height:1}
    .stat-sub{font-size:11px;color:var(--text-light);margin-top:6px}

    /* ALERT PANELS */
    .alert-panels{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px}
    .alert-panel{background:var(--white);border-radius:15px;box-shadow:var(--shadow);overflow:hidden}
    .alert-panel-header{padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
    .alert-panel-header.overdue{background:linear-gradient(135deg,#7B241C,var(--danger))}
    .alert-panel-header.upcoming{background:linear-gradient(135deg,#935116,#E67E22)}
    .alert-panel-header h3{font-family:'Playfair Display',serif;font-size:14px;color:#fff}
    .count-badge{background:rgba(255,255,255,.25);color:#fff;padding:2px 10px;border-radius:12px;font-size:13px;font-weight:700}
    .alert-list{max-height:260px;overflow-y:auto}
    .alert-item{padding:11px 18px;border-bottom:1px solid var(--cream-dark);display:flex;gap:9px;align-items:flex-start;transition:background .15s;cursor:pointer}
    .alert-item:hover{background:var(--cream)}.alert-item:last-child{border-bottom:none}
    .alert-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
    .alert-dot.red{background:var(--danger)}.alert-dot.orange{background:var(--warning)}
    .alert-info{flex:1;min-width:0}
    .alert-task{font-size:12.5px;font-weight:600;color:var(--text-dark)}
    .alert-project{font-size:10.5px;color:var(--text-light);margin-top:1px}
    .alert-date{font-size:10.5px;font-weight:700;white-space:nowrap;padding:2px 8px;border-radius:8px;flex-shrink:0;align-self:center}
    .alert-date.overdue{background:#FDEDEC;color:var(--danger)}
    .alert-date.upcoming{background:#FEF3E2;color:var(--warning)}
    .alert-empty{padding:22px;text-align:center;color:var(--text-light);font-size:13px}

    /* DATE FILTERS */
    .date-filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;padding:12px 16px;background:var(--white);border-radius:12px;box-shadow:var(--shadow)}
    .date-filters label{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text-light)}
    .date-filters input[type=date]{padding:6px 11px;border-radius:8px;border:1.5px solid var(--cream-dark);background:var(--cream);color:var(--text-dark);font-family:'DM Sans',sans-serif;font-size:12.5px;outline:none;transition:border-color .2s;cursor:pointer}
    .date-filters input[type=date]:focus{border-color:var(--bordo)}
    .date-filter-group{display:flex;align-items:center;gap:6px}
    .date-filter-sep{color:var(--text-light);font-size:12px}
    .date-type-toggle{display:flex;border-radius:8px;overflow:hidden;border:1.5px solid var(--cream-dark)}
    .date-type-btn{padding:6px 13px;font-size:11.5px;font-weight:600;cursor:pointer;background:var(--cream);color:var(--text-light);border:none;font-family:'DM Sans',sans-serif;transition:all .2s}
    .date-type-btn.active{background:var(--bordo);color:#fff}
    .btn-clear-filters{padding:6px 13px;border-radius:8px;font-size:11.5px;font-weight:600;cursor:pointer;background:none;border:1.5px solid var(--cream-dark);color:var(--text-light);font-family:'DM Sans',sans-serif;transition:all .2s;margin-left:auto}
    .btn-clear-filters:hover{border-color:var(--bordo);color:var(--bordo)}

    /* CHARTS */
    .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
    .chart-card{background:var(--white);border-radius:15px;padding:20px;box-shadow:var(--shadow)}
    .chart-card h3{font-family:'Playfair Display',serif;font-size:14.5px;color:var(--bordo-dark);margin-bottom:16px}

    /* FILTERS BAR */
    .filters-bar{display:flex;gap:9px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
    .filter-chip{padding:6px 15px;border-radius:20px;background:var(--white);color:var(--text-mid);border:1.5px solid var(--cream-dark);cursor:pointer;font-size:12.5px;font-weight:500;transition:all .2s}
    .filter-chip:hover,.filter-chip.active{background:var(--bordo);color:#fff;border-color:var(--bordo)}

    /* PROJECTS GRID */
    .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px}
    .project-card{background:var(--white);border-radius:17px;box-shadow:var(--shadow);overflow:hidden;transition:transform .2s,box-shadow .2s}
    .project-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
    .project-card-header{padding:16px 18px 13px;border-bottom:1px solid var(--cream-dark);display:flex;justify-content:space-between;align-items:flex-start}
    .project-area-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px}
    .project-name{font-family:'Playfair Display',serif;font-size:15.5px;font-weight:700;color:var(--bordo-dark)}
    .status-badge{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;letter-spacing:.4px;text-transform:uppercase;flex-shrink:0}
    .status-em_andamento{background:#EBF5FB;color:#1A5276}
    .status-concluido{background:#E8F8F0;color:#1E8449}
    .status-atrasado{background:#FDEDEC;color:#922B21}
    .status-cancelado{background:#F4F6F7;color:#717D7E}
    .project-card-body{padding:14px 18px}
    .project-scope{font-size:12px;color:var(--text-light);line-height:1.55;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

    /* RESULT BOX */
    .result-box{background:linear-gradient(135deg,var(--bordo-dark),var(--bordo));border-radius:11px;padding:13px 15px;color:#fff;margin-bottom:12px}
    .result-box-label{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-light);margin-bottom:7px}
    .result-box-title{font-size:12px;font-weight:500;opacity:.85;margin-bottom:11px;line-height:1.4}
    .result-compare{display:flex;gap:12px}
    .result-col{flex:1}
    .result-col-label{font-size:9px;letter-spacing:1px;opacity:.55;text-transform:uppercase;margin-bottom:2px}
    .result-col-value{font-size:19px;font-weight:700;line-height:1}
    .result-col-value.achieved{color:var(--gold-light)}
    .result-progress{margin-top:9px;height:5px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden}
    .result-progress-bar{height:100%;border-radius:3px;transition:width .5s ease}
    .progress-ok{background:var(--gold-light)}.progress-over{background:#5DADE2}.progress-low{background:#EC7063}

    /* AREA BADGES */
    .area-qualidade{background:#F5EEF8;color:#7D3C98}
    .area-produtos{background:#EBF5FB;color:#1A5276}
    .area-comercial{background:#E8F8F0;color:#1E8449}
    .area-marketing{background:#FEF9E7;color:#B7950B}
    .area-operacoes{background:#FDEDEC;color:#922B21}

    /* PROJECT ACTIONS */
    .project-actions{display:flex;gap:7px;padding:11px 18px;border-top:1px solid var(--cream-dark)}
    .btn-edit{flex:1;padding:7px;border-radius:8px;background:var(--cream);color:var(--text-mid);border:1px solid var(--cream-dark);cursor:pointer;font-size:12px;font-weight:600;text-align:center;font-family:'DM Sans',sans-serif;transition:all .2s}
    .btn-edit:hover{background:var(--bordo);color:#fff;border-color:var(--bordo)}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(44,26,14,.6);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:20px;opacity:0;pointer-events:none;transition:opacity .3s}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{background:var(--white);border-radius:19px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);transform:translateY(20px);transition:transform .3s}
    .modal-overlay.open .modal{transform:translateY(0)}
    .modal-header{padding:22px 28px 16px;border-bottom:1px solid var(--cream-dark);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--white);border-radius:19px 19px 0 0}
    .modal-header h3{font-family:'Playfair Display',serif;font-size:18px;color:var(--bordo-dark)}
    .modal-close{width:33px;height:33px;border-radius:50%;background:var(--cream-dark);border:none;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;color:var(--text-mid);transition:all .2s}
    .modal-close:hover{background:var(--bordo);color:#fff}
    .modal-body{padding:22px 28px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
    .form-full{grid-column:1/-1}
    .form-group{display:flex;flex-direction:column;gap:5px}
    .form-group label{font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--text-mid);text-transform:uppercase}
    .form-group input,.form-group select,.form-group textarea{padding:9px 12px;border-radius:9px;border:1.5px solid var(--cream-dark);background:var(--cream);color:var(--text-dark);font-family:'DM Sans',sans-serif;font-size:13px;transition:border-color .2s;outline:none}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--bordo);background:#fff}
    .form-group textarea{resize:vertical;min-height:72px}
    .modal-footer{padding:14px 28px 22px;display:flex;gap:10px;justify-content:flex-end}
    .btn-secondary{padding:9px 19px;border-radius:10px;background:var(--cream-dark);color:var(--text-mid);border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .2s}
    .btn-secondary:hover{background:var(--marrom-pale)}
    .btn-primary{padding:9px 21px;border-radius:10px;background:var(--bordo);color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .2s}
    .btn-primary:hover{background:var(--bordo-light)}

    /* DETAIL */
    .detail-section{margin-bottom:20px}
    .detail-section h4{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid var(--cream-dark)}
    .tasks-section{margin-top:20px}
    .tasks-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid var(--cream-dark)}
    .tasks-header h4{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-light)}
    .btn-sm{padding:5px 12px;border-radius:7px;font-size:11.5px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .2s}
    .btn-sm-primary{background:var(--bordo);color:#fff}.btn-sm-primary:hover{background:var(--bordo-light)}
    .task-card-detail{background:var(--cream);border-radius:10px;padding:11px 14px;margin-bottom:7px;display:flex;gap:9px;align-items:flex-start}
    .task-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
    .task-info{flex:1}
    .task-title-detail{font-size:13px;font-weight:600;color:var(--text-dark)}
    .task-meta{font-size:11px;color:var(--text-light);margin-top:2px}
    .task-actions{display:flex;gap:5px}
    .btn-icon{width:27px;height:27px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:var(--cream-dark);border:none;cursor:pointer;font-size:12px;transition:all .2s;color:var(--text-mid)}
    .btn-icon:hover{background:var(--bordo);color:#fff}
    .btn-icon.danger:hover{background:var(--danger)}
    .meta-info{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
    .meta-chip{display:flex;align-items:center;gap:4px;font-size:11.5px;color:var(--text-light)}

    /* LOADING */
    .loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text-light);font-size:14px;gap:12px}
    .spinner{width:19px;height:19px;border-radius:50%;border:3px solid var(--cream-dark);border-top-color:var(--bordo);animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty-state{text-align:center;padding:50px 40px;color:var(--text-light)}
    .empty-state .emoji{font-size:34px;margin-bottom:10px}
    .empty-state p{font-size:13.5px}
    .ornament{width:34px;height:3px;background:linear-gradient(90deg,var(--gold),var(--bordo-light));border-radius:2px;margin:5px 0 16px}
    .section-heading{font-family:'Playfair Display',serif;font-size:18px;color:var(--bordo-dark);margin-bottom:5px}
  </style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">

function fmtNum(v,u){if(v==null)return'-';if(u==='R$')return'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:0});if(u==='%')return Number(v).toLocaleString('pt-BR')+'%';return Number(v).toLocaleString('pt-BR')+(u?' '+u:'')}

function daysUntil(ds){if(!ds)return null;const t=new Date();t.setHours(0,0,0,0);return Math.ceil((new Date(ds+'T00:00:00')-t)/86400000)}

      </div>
      <div class="alert-panel">
        <div class="alert-panel-header upcoming"><h3>🔔 Vencem em 7 dias</h3><span class="count-badge">${upcoming.length}</span></div>
        <div class="alert-list">${upcoming.length===0?`<div class="alert-empty">🎉 Nenhum prazo urgente nos próximos 7 dias!</div>`:upcoming.sort((a,b)=>a.due_date.localeCompare(b.due_date)).map(t=>{const d=daysUntil(t.due_date);const lbl=d===0?'Hoje!':d===1?'Amanhã':`Em ${d}d`;return`<div class="alert-item" onclick="openDetail('${t.project_id}')"><div class="alert-dot orange"></div><div class="alert-info"><div class="alert-task">${t.title}</div><div class="alert-project">📁 ${t.projects?.name||'-'} · 👤 ${t.responsible||'-'}</div></div><span class="alert-date upcoming">${lbl}</span></div>`}).join('')}</div>

      <button class="filter-chip" onclick="filterStatus('em_andamento',this)">Em Andamento</button>
      <button class="filter-chip" onclick="filterStatus('atrasado',this)">Atrasados</button>
      <button class="filter-chip" onclick="filterStatus('concluido',this)">Concluídos</button>
      <button class="filter-chip" onclick="filterStatus('cancelado',this)">Cancelados</button>
    </div>
    <div class="projects-grid" id="projectsGrid">

  return`<div class="date-filters">

function syncDateInputs(){const df=document.getElementById('dateFrom');const dt=document.getElementById('dateTo');if(df)df.value=dateFrom;if(dt)dt.value=dateTo}
function setDateType(t){dateFilterType=t;document.querySelectorAll('.date-type-btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().includes(t==='entrega'?'entrega':'abertura')));applyDateFilter()}
function applyDateFilter(){dateFrom=document.getElementById('dateFrom')?.value||'';dateTo=document.getElementById('dateTo')?.value||'';applyAllFilters()}
function clearDateFilters(){dateFrom='';dateTo='';const df=document.getElementById('dateFrom');const dt=document.getElementById('dateTo');if(df)df.value='';if(dt)dt.value='';applyAllFilters()}
function filterStatus(s,btn){activeStatusFilter=s;document.querySelectorAll('#dashFilters .filter-chip').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');applyAllFilters()}
function applyAllFilters(){
  document.querySelectorAll('#projectsGrid .project-card').forEach(c=>{
    const s=c.dataset.status,start=c.dataset.start||'',end=c.dataset.end||'';
    const ref=dateFilterType==='entrega'?end:start;
    let show=true;
    if(activeStatusFilter!=='todos'&&s!==activeStatusFilter)show=false;
    if(dateFrom&&ref&&ref<dateFrom)show=false;
    if(dateTo&&ref&&ref>dateTo)show=false;
    if((dateFrom||dateTo)&&!ref)show=false;
    c.style.display=show?'':'none';
  });
}

function renderChartArea(byArea){const ctx=document.getElementById('chartArea');if(!ctx)return;if(charts.area)charts.area.destroy();charts.area=new Chart(ctx,{type:'bar',data:{labels:Object.keys(byArea).map(a=>areaLabels[a]),datasets:[{data:Object.values(byArea),backgroundColor:['#7D3C98','#1A5276','#1E8449','#B7950B','#922B21'],borderRadius:8}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}})}
function renderChartStatus(byStatus){const ctx=document.getElementById('chartStatus');if(!ctx)return;if(charts.status)charts.status.destroy();charts.status=new Chart(ctx,{type:'doughnut',data:{labels:['Em Andamento','Atrasado','Concluído','Cancelado'],datasets:[{data:Object.values(byStatus),backgroundColor:['#2563EB','#C0392B','#2E7D4F','#95A5A6'],borderWidth:0}]},options:{plugins:{legend:{position:'bottom'}},cutout:'65%'}})}

function renderProjectCard(p){
  const pct=p.result_target?Math.min(Math.round((p.result_achieved||0)/p.result_target*100),150):0;
  const barClass=pct>=100?'progress-over':pct>=60?'progress-ok':'progress-low';
  return`<div class="project-card" data-status="${p.status}" data-start="${p.start_date||''}" data-end="${p.end_date||''}">
    <div class="project-card-header">
      <div>
        <div class="project-area-badge area-${p.area}">${areaIcons[p.area]} ${areaLabels[p.area]}</div>
        <div class="project-name">${p.name}</div>
        <div style="font-size:11px;color:var(--text-light);margin-top:3px">👤 ${p.responsible||'-'} · 📅 ${fmtDate(p.end_date)}</div>
      </div>
      <span class="status-badge status-${p.status}">${statusLabels[p.status]}</span>
    </div>
    <div class="project-card-body">
      <div class="project-scope">${p.scope||'Sem descrição de escopo.'}</div>
      ${p.planned_result?`<div class="result-box">
        <div class="result-box-label">🎯 Resultado Mensurável</div>
        <div class="result-box-title">${p.planned_result}</div>
        <div class="result-compare">
          <div class="result-col"><div class="result-col-label">Previsto</div><div class="result-col-value">${fmtNum(p.result_target,p.result_unit)}</div></div>
          <div class="result-col"><div class="result-col-label">Realizado</div><div class="result-col-value achieved">${fmtNum(p.result_achieved,p.result_unit)}</div></div>
          <div class="result-col" style="display:flex;align-items:flex-end"><div style="font-size:24px;font-weight:700;color:${pct>=100?'#5DADE2':pct>=60?'var(--gold-light)':'#EC7063'}">${pct}%</div></div>
        </div>
        <div class="result-progress"><div class="result-progress-bar ${barClass}" style="width:${Math.min(pct,100)}%"></div></div>
      </div>`:''}
    </div>
    <div class="project-actions">
      <button class="btn-edit" onclick="openDetail('${p.id}')">Ver Detalhes</button>
      <button class="btn-edit" onclick="editProject('${p.id}')">✏️ Editar</button>
    </div>
  </div>`
}

async function openDetail(projectId){
  currentProjectId=projectId;
  const[{data:p},{data:tasks}]=await Promise.all([
    sb.from('projects').select('*').eq('id',projectId).single(),
    sb.from('tasks').select('*').eq('project_id',projectId).order('due_date')
  ]);
  document.getElementById('detailTitle').textContent=p.name;
  const pct=p.result_target?Math.min(Math.round((p.result_achieved||0)/p.result_target*100),150):0;
  const barClass=pct>=100?'progress-over':pct>=60?'progress-ok':'progress-low';
  const taskList=(tasks||[]).map(t=>{
    const d=daysUntil(t.due_date);let chip='';
    if(t.status!=='concluida'&&t.due_date){if(d<0)chip=`<span style="background:#FDEDEC;color:var(--danger);padding:2px 7px;border-radius:7px;font-size:9.5px;font-weight:700">${Math.abs(d)}d atraso</span>`;else if(d<=7)chip=`<span style="background:#FEF3E2;color:var(--warning);padding:2px 7px;border-radius:7px;font-size:9.5px;font-weight:700">${d===0?'Hoje!':d===1?'Amanhã':'Em '+d+'d'}</span>`}
    const dotColor=t.status==='concluida'?'#2E7D4F':t.status==='atrasada'?'#C0392B':t.status==='em_andamento'?'#2563EB':'#C4A882';
    return`<div class="task-card-detail"><div class="task-status-dot" style="background:${dotColor}"></div><div class="task-info"><div class="task-title-detail">${t.title} ${chip}</div><div class="task-meta">👤 ${t.responsible||'-'} · 📅 ${fmtDate(t.due_date)} · ${taskStatusLabels[t.status]||t.status}</div></div><div class="task-actions"><button class="btn-icon" onclick="editTask('${t.id}')">✏️</button><button class="btn-icon danger" onclick="deleteTask('${t.id}')">🗑️</button></div></div>`
  }).join('')||'<div style="color:var(--text-light);font-size:13px;padding:10px 0">Nenhuma tarefa cadastrada.</div>';

  document.getElementById('detailBody').innerHTML=`
    <div class="meta-info">
      <span class="project-area-badge area-${p.area}">${areaIcons[p.area]} ${areaLabels[p.area]}</span>
      <span class="status-badge status-${p.status}">${statusLabels[p.status]}</span>
      <span class="meta-chip">📅 ${fmtDate(p.start_date)} → ${fmtDate(p.end_date)}</span>
      <span class="meta-chip">👤 ${p.responsible||'-'}</span>
    </div>
    ${p.planned_result?`<div class="result-box" style="margin-bottom:20px">
      <div class="result-box-label">🎯 Resultado Mensurável</div>
      <div class="result-box-title">${p.planned_result}</div>
      <div class="result-compare">
        <div class="result-col"><div class="result-col-label">Previsto</div><div class="result-col-value" style="font-size:24px">${fmtNum(p.result_target,p.result_unit)}</div></div>
        <div class="result-col"><div class="result-col-label">Realizado</div><div class="result-col-value achieved" style="font-size:24px">${fmtNum(p.result_achieved,p.result_unit)}</div></div>
        <div class="result-col"><div class="result-col-label">Atingimento</div><div style="font-size:24px;font-weight:700;color:${pct>=100?'#5DADE2':pct>=60?'var(--gold-light)':'#EC7063'}">${pct}%</div></div>
      </div>
      <div class="result-progress" style="height:6px;margin-top:13px"><div class="result-progress-bar ${barClass}" style="width:${Math.min(pct,100)}%"></div></div>
    </div>`:''}
    <div class="detail-section"><h4>Escopo do Projeto</h4><p style="font-size:13px;line-height:1.7;color:var(--text-mid)">${p.scope||'Não informado.'}</p></div>
    <div class="tasks-section">
      <div class="tasks-header"><h4>Tarefas (${(tasks||[]).length})</h4><button class="btn-sm btn-sm-primary" onclick="openTaskModal()">+ Tarefa</button></div>
      ${taskList}
    </div>`;
  openModal('detailModal');
}

// SEARCH
function showSearchResults(){const v=document.getElementById('globalSearch').value.trim();if(v.length>1)performSearch(v)}
function onSearchInput(v){clearTimeout(searchTimeout);if(!v.trim()){hideSearch();return}searchTimeout=setTimeout(()=>performSearch(v.trim()),300)}
async function performSearch(q){
  const ql=q.toLowerCase();
  const[{data:projects},{data:tasks}]=await Promise.all([
    sb.from('projects').select('id,name,area,status,responsible').ilike('name',`%${ql}%`),
    sb.from('tasks').select('id,title,project_id,responsible,due_date,status,projects(name,area)').or(`title.ilike.%${ql}%,responsible.ilike.%${ql}%`)
  ]);
  const ps=(projects||[]).slice(0,5),ts=(tasks||[]).slice(0,6);
  const box=document.getElementById('searchResults');
  if(!ps.length&&!ts.length){box.innerHTML=`<div class="search-empty">Nenhum resultado para "<strong>${q}</strong>"</div>`;box.classList.add('show');return}
  let html='';
  if(ps.length){html+=`<div class="search-section-label">Projetos</div>`;html+=ps.map(p=>`<div class="search-result-item" onclick="gotoProject('${p.id}','${p.area}')"><span class="res-icon">${areaIcons[p.area]||'📁'}</span><div class="res-info"><div class="res-name">${p.name}</div><div class="res-meta">${areaLabels[p.area]} · 👤 ${p.responsible||'-'}</div></div><span class="status-badge status-${p.status}" style="font-size:9.5px;padding:3px 8px">${statusLabels[p.status]}</span></div>`).join('')}
  if(ts.length){html+=`<div class="search-section-label">Tarefas</div>`;html+=ts.map(t=>`<div class="search-result-item" onclick="openDetail('${t.project_id}');hideSearch()"><span class="res-icon">📋</span><div class="res-info"><div class="res-name">${t.title}</div><div class="res-meta">📁 ${t.projects?.name||'-'} · 📅 ${fmtDate(t.due_date)}</div></div></div>`).join('')}
  box.innerHTML=html;box.classList.add('show');
}
function hideSearch(){document.getElementById('searchResults').classList.remove('show')}
function clearSearch(){document.getElementById('globalSearch').value='';hideSearch()}
function gotoProject(id,area){hideSearch();navigate(area);setTimeout(()=>openDetail(id),600)}
document.addEventListener('click',e=>{if(!document.getElementById('searchBarWrap').contains(e.target))hideSearch()});

// MODALS
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open');if(id==='projectModal')editingProject=null;if(id==='taskModal')currentTaskId=null}

function openProjectModal(){
  editingProject=null;
  document.getElementById('modalTitle').textContent='Novo Projeto';
  ['pName','pScope','pResponsible','pResultDesc','pResultUnit','pResultTarget','pResultAchieved'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pArea').value=currentView!=='dashboard'?currentView:'qualidade';
  document.getElementById('pYear').value=currentYear;
  document.getElementById('pStatus').value='em_andamento';
  document.getElementById('pStart').value='';document.getElementById('pEnd').value='';
  openModal('projectModal');
}

async function editProject(id){
  const{data:p}=await sb.from('projects').select('*').eq('id',id).single();
  editingProject=p;
  document.getElementById('modalTitle').textContent='Editar Projeto';
  document.getElementById('pName').value=p.name||'';document.getElementById('pArea').value=p.area||'qualidade';
  document.getElementById('pYear').value=p.year||currentYear;document.getElementById('pResponsible').value=p.responsible||'';
  document.getElementById('pStatus').value=p.status||'em_andamento';document.getElementById('pStart').value=p.start_date||'';
  document.getElementById('pEnd').value=p.end_date||'';document.getElementById('pScope').value=p.scope||'';
  document.getElementById('pResultDesc').value=p.planned_result||'';document.getElementById('pResultUnit').value=p.result_unit||'';
  document.getElementById('pResultTarget').value=p.result_target??'';document.getElementById('pResultAchieved').value=p.result_achieved??'';
  openModal('projectModal');
}

async function saveProject(){
  const data={name:document.getElementById('pName').value.trim(),area:document.getElementById('pArea').value,year:parseInt(document.getElementById('pYear').value),responsible:document.getElementById('pResponsible').value.trim(),status:document.getElementById('pStatus').value,start_date:document.getElementById('pStart').value||null,end_date:document.getElementById('pEnd').value||null,scope:document.getElementById('pScope').value.trim(),planned_result:document.getElementById('pResultDesc').value.trim(),result_unit:document.getElementById('pResultUnit').value.trim(),result_target:parseFloat(document.getElementById('pResultTarget').value)||null,result_achieved:parseFloat(document.getElementById('pResultAchieved').value)||null};
  if(!data.name){alert('Informe o nome do projeto.');return}
  if(editingProject)await sb.from('projects').update(data).eq('id',editingProject.id);
  else await sb.from('projects').insert(data);
  closeModal('projectModal');await renderYears();render();
}

function openTaskModal(taskId=null){
  currentTaskId=taskId;
  document.getElementById('taskModalTitle').textContent=taskId?'Editar Tarefa':'Nova Tarefa';
  if(!taskId){['tTitle','tDescription','tResponsible'].forEach(id=>document.getElementById(id).value='');document.getElementById('tDue').value='';document.getElementById('tStatus').value='pendente';document.getElementById('tPriority').value='media'}
  openModal('taskModal');
}

async function editTask(taskId){
  const{data:t}=await sb.from('tasks').select('*').eq('id',taskId).single();
  currentTaskId=taskId;
  document.getElementById('taskModalTitle').textContent='Editar Tarefa';
  document.getElementById('tTitle').value=t.title||'';document.getElementById('tDescription').value=t.description||'';
  document.getElementById('tResponsible').value=t.responsible||'';document.getElementById('tDue').value=t.due_date||'';
  document.getElementById('tStatus').value=t.status||'pendente';document.getElementById('tPriority').value=t.priority||'media';
  openModal('taskModal');
}

async function saveTask(){
  const data={project_id:currentProjectId,title:document.getElementById('tTitle').value.trim(),description:document.getElementById('tDescription').value.trim(),responsible:document.getElementById('tResponsible').value.trim(),due_date:document.getElementById('tDue').value||null,status:document.getElementById('tStatus').value,priority:document.getElementById('tPriority').value};
  if(!data.title){alert('Informe o título da tarefa.');return}
  if(currentTaskId)await sb.from('tasks').update(data).eq('id',currentTaskId);
  else await sb.from('tasks').insert(data);
  closeModal('taskModal');openDetail(currentProjectId);
}

async function deleteTask(taskId){
  if(!confirm('Excluir esta tarefa?'))return;
  await sb.from('tasks').delete().eq('id',taskId);
  openDetail(currentProjectId);
}

(async()=>{await renderYears();render()})();
</script>
</body>
</html>
